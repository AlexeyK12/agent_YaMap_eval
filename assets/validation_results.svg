<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Сравнение точности моделей">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-20%" width="110%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <text x="54" y="62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Сравнение подходов на валидации</text>
  <text x="54" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#64748b">Основная метрика задания - accuracy. Лучший результат даёт ансамбль трансформеров.</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">
    <line x1="300" y1="128" x2="300" y2="440" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="300" y1="440" x2="1100" y2="440" stroke="#cbd5e1" stroke-width="2"/>
    <text x="54" y="163">TF-IDF + Ridge</text>
    <rect x="300" y="140" width="597" height="28" rx="8" fill="#bfdbfe" filter="url(#shadow)"/>
    <text x="914" y="161" font-weight="800" fill="#1d4ed8">0.5969</text>
    <text x="54" y="213">rubert-tiny2</text>
    <rect x="300" y="190" width="627" height="28" rx="8" fill="#93c5fd" filter="url(#shadow)"/>
    <text x="944" y="211" font-weight="800" fill="#1d4ed8">0.6269</text>
    <text x="54" y="263">ruBert-base</text>
    <rect x="300" y="240" width="691" height="28" rx="8" fill="#60a5fa" filter="url(#shadow)"/>
    <text x="1008" y="261" font-weight="800" fill="#1d4ed8">0.6913</text>
    <text x="54" y="313">ruBert + калибровка</text>
    <rect x="300" y="290" width="699" height="28" rx="8" fill="#38bdf8" filter="url(#shadow)"/>
    <text x="1016" y="311" font-weight="800" fill="#0369a1">0.6988</text>
    <text x="54" y="363" font-weight="800">Ансамбль BERT</text>
    <rect x="300" y="340" width="707" height="30" rx="9" fill="url(#bar)" filter="url(#shadow)"/>
    <text x="1026" y="362" font-weight="900" fill="#15803d">0.7067</text>
    <text x="54" y="413">Агент RouterAI + Serper</text>
    <rect x="300" y="390" width="500" height="28" rx="8" fill="#fecaca" filter="url(#shadow)"/>
    <text x="817" y="411" font-weight="800" fill="#b91c1c">0.5000</text>
  </g>
  <text x="54" y="480" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">Агент проверялся на 20 валидационных примерах; остальные значения получены на валидационном разбиении обучающей выборки.</text>
</svg>
